name: Auto-Entrenamiento Futbol

on:
  schedule:
    # Se ejecuta todos los lunes a las 08:00 AM UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # Permite ejecutarlo manualmente si quieres probar

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install numpy scipy psycopg2-binary requests

      - name: Ejecutar script de entrenamiento
        env:
          # Estas variables las configuraremos en los "Secrets" de GitHub
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_KEY_FUTBOL: ${{ secrets.API_KEY_FUTBOL }}
        run: python trainer.py
